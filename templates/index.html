<!DOCTYPE html>
<html>
<head>
    <title>Document Search Engine</title>
    <style>
        body { font-family: Arial; text-align: center; background: #f4f4f4; }
        input { width: 50%; padding: 10px; }
        button { padding: 10px; background: green; color: white; }
        .result {
            background: white;
            margin: 10px auto;
            padding: 15px;
            width: 60%;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>🔍 Document Search Engine</h1>

<form method="POST">
    <input type="text" name="query" placeholder="Enter query..." value="{{ query }}">
    <button type="submit">Search</button>
</form>

{% for r in results %}
<div class="result">
    <h3>{{ r.doc }}</h3>
    <p>Score: {{ r.score }}</p>
    <p>{{ r.preview }}</p>
</div>
{% endfor %}

</body>
</html>
